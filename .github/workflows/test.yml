name: Playwright Tests with Allure Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  web-tests:
    name: Web Tests - ${{ matrix.browser }}
    permissions:
      contents: write
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create .env file for UI tests
        run: |
          cat > .env << 'EOF'
          # Non-sensitive configuration
          TEST_ENV=UI
          BROWSER=chromium
          TIMEOUT=30000
          WORKERS=1
          HEADLESS=true
          EOF
          
          # Append secrets with fallback defaults (must be outside heredoc to use GitHub Actions syntax)
          echo "BASE_URL=${{ secrets.BASE_URL || 'https://opensource-demo.orangehrmlive.com/web/index.php/auth/login' }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL || 'https://posthook-api.mock.beeceptor.com' }}" >> .env
          echo "TEST_USER=${{ secrets.TEST_USER || 'Admin' }}" >> .env
          echo "TEST_PASSWORD=${{ secrets.TEST_PASSWORD || 'admin123' }}" >> .env

      - name: Generate tests from features
        run: npx bddgen

      - name: Run web tests on Chrome
        run: npx playwright test --project=chromium --grep @web

      - name: Upload Allure results
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npx allure generate allure-results --clean -o allure-report
          else
            echo "No allure-results found, skipping report generation"
            mkdir -p allure-report
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-web-chromium
          path: allure-report/
          retention-days: 30

  api-tests:
    name: API Tests
    permissions:
      contents: write
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create .env file for API tests
        run: |
          cat > .env << 'EOF'
          # API Test Configuration
          TEST_ENV=API
          BROWSER=chromium
          TIMEOUT=30000
          WORKERS=1
          HEADLESS=true
          ALLURE_RESULTS_DIR=allure-results
          
          # API Endpoints
          GET_ENDPOINT=/v1/hooks
          POST_ENDPOINT=/v1/hooks
          DELETE_ENDPOINT=/v1/hooks/{hook_id}
          PUT_ENDPOINT=/v1/projects/
          EOF
          
          # Append secrets with fallback defaults (must be outside heredoc to use GitHub Actions syntax)
          echo "BASE_URL=${{ secrets.API_BASE_URL || 'https://posthook-api.mock.beeceptor.com' }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL || 'https://posthook-api.mock.beeceptor.com' }}" >> .env
          echo "TEST_USER=${{ secrets.TEST_USER || 'Admin' }}" >> .env
          echo "TEST_PASSWORD=${{ secrets.TEST_PASSWORD || 'admin123' }}" >> .env

      - name: Generate tests from features
        run: npx bddgen

      - name: Run API tests
        run: npx playwright test --project=API --grep @api
      
      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npx allure generate allure-results --clean -o allure-report
          else
            echo "No allure-results found, skipping report generation"
            mkdir -p allure-report
          fi

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 30

  publish-allure-report:
    name: Publish Merged Allure Report
    needs: [ web-tests, api-tests ]
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download all Allure results artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: allure-results-*

      - name: Merge Allure results
        run: |
          mkdir -p allure-results-merged
          find artifacts/ -type f -name "*.json" | while read file; do
            cp "$file" allure-results-merged/
          done
          COUNT=$(find allure-results-merged -type f | wc -l)
          echo "✅ Merged $COUNT test result files from artifacts/"

      - name: Generate merged Allure report
        run: npx allure generate allure-results-merged --clean -o allure-report

      - name: Upload merged report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-merged
          path: allure-report/
          retention-days: 90

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

  allure-pr-comment:
    name: Add Test Summary to PR
    if: github.event_name == 'pull_request' && always()
    needs: [ web-tests, api-tests ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: allure-results-web-chromium

      - name: Generate Allure report for PR
        run: npx allure generate artifacts/allure-results-web-chromium --clean -o allure-report

      - name: Publish report summary to PR
        uses: allure-framework/allure-action@v0
        if: always()
        with:
          report-directory: allure-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
